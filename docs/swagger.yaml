      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.okResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
