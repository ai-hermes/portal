  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user and creates a tenant.
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.registerRequest'
      produces:
