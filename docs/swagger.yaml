      password:
        type: string
    type: object
  api.okResponse:
    properties:
      ok:
        type: boolean
    type: object
  api.refreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  api.registerByPhoneRequest:
    properties:
      code:
