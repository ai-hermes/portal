      relation:
        type: string
      subject:
        type: string
    type: object
info:
  contact: {}
  description: AI-Hermes Portal backend APIs.
  title: AI-Hermes Portal API
  version: "1.0"
paths:
  /api/v1/admin/litellm/access:
    get:
      description: Returns whether current user can manage LiteLLM credit.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.liteLLMAccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: LiteLLM access info
      tags:
      - litellm
  /api/v1/admin/litellm/calls/{tenant_id}/{user_id}:
    get:
      description: Lists recent LiteLLM calls for a tenant user (platform admin only).
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: path
        name: tenant_id
        required: true
        type: string
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      - description: Max number of records
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.liteLLMRecentCallsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
      security:
      - BearerAuth: []
      summary: List user recent calls (admin)
      tags:
      - litellm
  /api/v1/admin/litellm/credits/{tenant_id}/{user_id}:
    get:
      description: Gets LiteLLM credit snapshot for tenant user (platform admin only).
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Tenant ID
        in: path
        name: tenant_id
        required: true
        type: string
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/litellmcredit.CreditSnapshot'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
      security:
      - BearerAuth: []
      summary: Get user credit (admin)
      tags:
      - litellm
  /api/v1/admin/litellm/credits/adjust:
    post:
      consumes:
      - application/json
      description: Adjusts LiteLLM credit by set/delta (platform admin only).
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Adjust credit payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.liteLLMCreditAdjustRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/litellmcredit.CreditSnapshot'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
      security:
      - BearerAuth: []
      summary: Adjust user credit (admin)
      tags:
      - litellm
  /api/v1/admin/litellm/events:
    get:
      description: Lists LiteLLM credit adjustment events (platform admin only).
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.liteLLMEventsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
      security:
      - BearerAuth: []
      summary: List credit events (admin)
      tags:
      - litellm
  /api/v1/audit/events:
    get:
      description: Queries tenant audit events with optional filters.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Actor user id
        in: query
        name: actor
        type: string
      - description: Action
        in: query
        name: action
        type: string
      - description: Resource
        in: query
        name: resource
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.auditEventsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
      security:
      - BearerAuth: []
      summary: Query audit events
      tags:
      - audit
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Logs in by account(email/phone) and password.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/authn.TokenPair'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      summary: Login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the given refresh token.
      parameters:
      - description: Logout payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.okResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      summary: Logout
      tags:
      - auth
  /api/v1/auth/password/change:
    post:
      consumes:
      - application/json
      description: Changes current user's password.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Change password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.okResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /api/v1/auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Sends password reset token to the email.
      parameters:
      - description: Forgot password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.okResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorMessageResponse'
        "500":
