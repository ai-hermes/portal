services:
  postgres:
    image: "${IMAGE_REGISTRY:-docker.io}/postgres:16-alpine"
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-portal}"
      POSTGRES_USER: "${POSTGRES_USER:-portal}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-portal}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8080}:8080"
    depends_on:
      openfga:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  openfga-migrate:
    image: "${IMAGE_REGISTRY:-docker.io}/openfga/openfga:latest"
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "${OPENFGA_DATASTORE_URI:-}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  openfga:
    image: "${IMAGE_REGISTRY:-docker.io}/openfga/openfga:latest"
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "${OPENFGA_DATASTORE_URI:-}"
      OPENFGA_PLAYGROUND_ENABLED: "false"
      OPENFGA_AUTHN_METHOD: none
    ports:
      - "${HOST_OPENFGA_PORT:-8081}:8080"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/openfga", "version"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s

volumes:
  postgres-data:
