name: aliyun-ecs-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234). Empty = current commit tag"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: aliyun-ecs-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
      ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
      IMAGE_REPO: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          test -n "${ACR_REGISTRY}" || (echo "ALIYUN_ACR_REGISTRY is required" && exit 1)
          test -n "${ACR_NAMESPACE}" || (echo "ALIYUN_ACR_NAMESPACE is required" && exit 1)
          test -n "${{ secrets.ECS_HOST }}" || (echo "ECS_HOST is required" && exit 1)
          test -n "${{ secrets.ECS_USER }}" || (echo "ECS_USER is required" && exit 1)
          test -n "${{ secrets.ECS_DEPLOY_PATH }}" || (echo "ECS_DEPLOY_PATH is required" && exit 1)

      - name: Compute image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="sha-${SHORT_SHA}"
          fi
          IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_REPO}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Using image: ${IMAGE}"

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push image
        if: github.event_name == 'push' || github.event.inputs.image_tag == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copy deploy files to ECS
        run: |
          SCP_PORT="${{ secrets.ECS_PORT }}"
          if [ -z "$SCP_PORT" ]; then SCP_PORT=22; fi
          ssh -p "$SCP_PORT" -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "mkdir -p '${{ secrets.ECS_DEPLOY_PATH }}'"
          scp -P "$SCP_PORT" -o StrictHostKeyChecking=no \
            deploy/ecs/docker-compose.prod.yml \
            deploy/ecs/.env.tmpl \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:${{ secrets.ECS_DEPLOY_PATH }}/"
          ssh -p "$SCP_PORT" -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" \
            "mv '${{ secrets.ECS_DEPLOY_PATH }}/docker-compose.prod.yml' '${{ secrets.ECS_DEPLOY_PATH }}/docker-compose.yml'"

      - name: Deploy on ECS
        env:
          BACKEND_IMAGE: ${{ steps.vars.outputs.image }}
          IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          SWAGGER_ENABLED: ${{ vars.SWAGGER_ENABLED }}
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          LITELLM_DEFAULT_MODEL: ${{ vars.LITELLM_DEFAULT_MODEL || secrets.LITELLM_DEFAULT_MODEL }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          OPENFGA_STORE_ID: ${{ secrets.OPENFGA_STORE_ID }}
          SMS_PROVIDER: ${{ secrets.SMS_PROVIDER }}
          ALIBABA_CLOUD_REGION_ID: ${{ secrets.ALIBABA_CLOUD_REGION_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIYUN_SMS_SIGN_NAME: ${{ secrets.ALIYUN_SMS_SIGN_NAME }}
          ALIYUN_SMS_TEMPLATE_CODE_REGISTER: ${{ secrets.ALIYUN_SMS_TEMPLATE_CODE_REGISTER }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          SSH_PORT="${{ secrets.ECS_PORT }}"
          if [ -z "$SSH_PORT" ]; then SSH_PORT=22; fi

          export ACCESS_TOKEN_TTL="${ACCESS_TOKEN_TTL:-15m}"
          export REFRESH_TOKEN_TTL="${REFRESH_TOKEN_TTL:-720h}"
          export EMAIL_CODE_TTL="${EMAIL_CODE_TTL:-10m}"
          export SMS_CODE_TTL="${SMS_CODE_TTL:-10m}"
          export SMS_RATE_WINDOW="${SMS_RATE_WINDOW:-10m}"
          export SMS_RESEND_INTERVAL="${SMS_RESEND_INTERVAL:-60s}"
          export SMS_MAX_PER_PHONE="${SMS_MAX_PER_PHONE:-5}"
          export SMS_MAX_PER_IP="${SMS_MAX_PER_IP:-20}"
          export PASSWORD_RESET_TTL="${PASSWORD_RESET_TTL:-15m}"
          export SWAGGER_ENABLED="${SWAGGER_ENABLED:-true}"
          export LITELLM_BASE_URL="${LITELLM_BASE_URL}"
          export LITELLM_DEFAULT_MODEL="${LITELLM_DEFAULT_MODEL:-gpt-4o-mini}"
          export LITELLM_HTTP_TIMEOUT="${LITELLM_HTTP_TIMEOUT:-5s}"
          export LITELLM_DEFAULT_USER_QUOTA="${LITELLM_DEFAULT_USER_QUOTA:-10}"
          export AUTHZ_PROVIDER="${AUTHZ_PROVIDER:-openfga}"
          export OPENFGA_API_URL="${OPENFGA_API_URL:-http://openfga:8080}"
          export SMS_PROVIDER="${SMS_PROVIDER:-aliyun}"

          # Render .env locally from template, then push to ECS
          envsubst < deploy/ecs/.env.tmpl > /tmp/.env.rendered

          scp -P "$SSH_PORT" -o StrictHostKeyChecking=no \
            /tmp/.env.rendered \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:${{ secrets.ECS_DEPLOY_PATH }}/.env"

          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" << 'EOF'
            set -euo pipefail
            cd "${{ secrets.ECS_DEPLOY_PATH }}"
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login "${{ secrets.ALIYUN_ACR_REGISTRY }}" -u "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d
          EOF

      - name: Health check
        run: |
          ADDR="${{ secrets.APP_HEALTHCHECK_ADDRESS }}"
          URL=""

          if [ -z "$ADDR" ]; then
            URL="http://${{ secrets.ECS_HOST }}:8080/healthz"
          elif [[ "$ADDR" == http://* || "$ADDR" == https://* ]]; then
            URL="$ADDR"
          else
            if [[ "$ADDR" =~ :443($|/) ]]; then
              SCHEME="https"
            elif [[ "$ADDR" =~ :80($|/) ]]; then
              SCHEME="http"
            elif [[ "$ADDR" == *:* ]]; then
              SCHEME="http"
            else
              SCHEME="https"
            fi
            URL="${SCHEME}://${ADDR}"
          fi

          if [[ "$URL" =~ ^https?://[^/]+$ ]]; then
            URL="${URL}/healthz"
          fi

          for i in $(seq 1 30); do
            if curl -fsS "$URL" >/dev/null; then
              echo "Health check passed: $URL"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed: $URL"
          exit 1
