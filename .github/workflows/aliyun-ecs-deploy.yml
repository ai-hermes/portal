name: aliyun-ecs-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234). Empty = current commit tag"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: aliyun-ecs-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
      ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
      IMAGE_REPO: ai-hermas-portal/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="sha-${SHORT_SHA}"
          fi
          IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_REPO}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push image
        if: github.event_name == 'push' || github.event.inputs.image_tag == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copy deploy files to ECS
        run: |
          SCP_PORT="${{ secrets.ECS_PORT }}"
          if [ -z "$SCP_PORT" ]; then SCP_PORT=22; fi
          ssh -p "$SCP_PORT" -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "mkdir -p '${{ secrets.ECS_DEPLOY_PATH }}'"
          scp -P "$SCP_PORT" -o StrictHostKeyChecking=no deploy/ecs/docker-compose.prod.yml "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:${{ secrets.ECS_DEPLOY_PATH }}/docker-compose.yml"

      - name: Deploy on ECS
        run: |
          SSH_PORT="${{ secrets.ECS_PORT }}"
          if [ -z "$SSH_PORT" ]; then SSH_PORT=22; fi
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" << 'EOF'
            set -euo pipefail
            cd "${{ secrets.ECS_DEPLOY_PATH }}"

            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login "${{ secrets.ALIYUN_ACR_REGISTRY }}" -u "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin

            if [ ! -f .env ]; then
              {
                printf 'BACKEND_IMAGE=%s\n' "${{ steps.vars.outputs.image }}"
                printf 'HOST_PORT=8080\n'
                printf 'AUTHZ_PROVIDER=memory\n'
                printf 'OPENFGA_API_URL=\n'
                printf 'OPENFGA_STORE_ID=\n'
              } > .env
            else
              if grep -q '^BACKEND_IMAGE=' .env; then
                sed -i.bak "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${{ steps.vars.outputs.image }}|" .env
              else
                printf '\nBACKEND_IMAGE=%s\n' "${{ steps.vars.outputs.image }}" >> .env
              fi
            fi

            docker compose pull
            docker compose up -d
          EOF

      - name: Health check
        run: |
          URL="${{ secrets.APP_HEALTHCHECK_URL }}"
          if [ -z "$URL" ]; then URL="http://${{ secrets.ECS_HOST }}:8080/healthz"; fi
          for i in $(seq 1 30); do
            if curl -fsS "$URL" >/dev/null; then
              echo "Health check passed: $URL"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed: $URL"
          exit 1
